---
name: CI

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566

      - name: Check
        run: mise run check

      - name: Build
        run: mise run build

      - name: Smoke test CLI
        run: |
          ./dist/notes help
          ./dist/notes root

  aur-changes:
    name: Check AUR-relevant changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      app_changed: ${{ steps.changed.outputs.app_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 "$AFTER_SHA")"
          fi

          app_changed=false
          while IFS= read -r file; do
            case "$file" in
              src/*|package.json|bun.lock|mise.toml|LICENSE|.scripts/linux/*)
                app_changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")

          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"

  update-aur:
    name: Update AUR (repo-notes-git)
    runs-on: ubuntu-latest
    needs:
      - build
      - aur-changes
    container:
      image: ghcr.io/timmo001/system-bridge/ci-build-arch:latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.aur-changes.outputs.app_changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566

      - name: Test build
        run: |
          git config --global --add safe.directory "$(pwd)"
          mise run build

      - name: Update AUR package
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x ./.scripts/linux/update-aur.sh
          if [ "$(id -u)" -eq 0 ] && id -u builduser >/dev/null 2>&1; then
            chown -R builduser:builduser "$(pwd)"
            exec sudo --preserve-env=CI,AUR_SSH_PRIVATE_KEY,GITHUB_SHA,GITHUB_WORKSPACE -u builduser -H bash ./.scripts/linux/update-aur.sh
          fi
          .scripts/linux/update-aur.sh
