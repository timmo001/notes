---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@aa9e6d61a254018160ae491b799b36ecdf2d114d # master
    with:
      scandir: ./.scripts
      severity: warning
