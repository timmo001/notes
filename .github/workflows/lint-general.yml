---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@7c0c9b99547a5d90bb16f35ac848695c4b6473ab # master
    with:
      scandir: ./.scripts
      severity: warning
