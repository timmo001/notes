---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@258c64aeee76aec4a45ed2a3e54b2393460c303b # master
    with:
      scandir: ./.scripts
      severity: warning
