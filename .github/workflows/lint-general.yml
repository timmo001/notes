---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@405726c0d3241169dc241682ffa91176f9a82916 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@405726c0d3241169dc241682ffa91176f9a82916 # master
    with:
      scandir: ./.scripts
      severity: warning
