---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@1ea0fac26899267238536ab89577325194934ded # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@1ea0fac26899267238536ab89577325194934ded # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@1ea0fac26899267238536ab89577325194934ded # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@1ea0fac26899267238536ab89577325194934ded # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@1ea0fac26899267238536ab89577325194934ded # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@1ea0fac26899267238536ab89577325194934ded # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@1ea0fac26899267238536ab89577325194934ded # master
    with:
      scandir: ./.scripts
      severity: warning
