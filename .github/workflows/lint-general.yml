---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@89463002ce025fb5be762b11083f1f26f58d76b1 # master
    with:
      scandir: ./.scripts
      severity: warning
