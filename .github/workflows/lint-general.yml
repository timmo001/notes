---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@6583610312ab4a83b2cdebf40608d838f631ed74 # master
    with:
      scandir: ./.scripts
      severity: warning
