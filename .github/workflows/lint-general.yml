---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@22f512045eebd34e7f8b1cb5171a00f53c68287c # master
    with:
      scandir: ./.scripts
      severity: warning
