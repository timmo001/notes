---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@e8abb2a494c5869c6aa88642636f735e265cdae7 # master
    with:
      scandir: ./.scripts
      severity: warning
