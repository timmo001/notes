---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  skills:
    uses: timmo001/workflows/.github/workflows/lint-agent-skills.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@a579ffd827f9944e936ae691ac0b82aa5155963e # master
    with:
      scandir: ./.scripts
      severity: warning
