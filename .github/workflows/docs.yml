---
name: Docs

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/cli/spec.ts"
      - "src/mcp/toolMetadata.ts"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "src/cli/spec.ts"
      - "src/mcp/toolMetadata.ts"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up mise
        uses: jdx/mise-action@5ac50f778e26fac95da98d50503682459e86d566

      - name: Regenerate docs
        run: mise run docs:gen

      - name: Verify generated docs are in sync
        run: git diff --exit-code -- docs/src/content/docs/cli/commands.md docs/src/content/docs/mcp/tools.md

      - name: Build docs
        run: mise run docs:build
