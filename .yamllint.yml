---
# yamllint config. The dedicated lint-yamllint workflow runs with strict: false,
# so only error-level problems fail CI; warnings stay visible but non-blocking.
# Rules are set to error where we want them enforced.
extends: default

ignore: |
  node_modules/
  docs/dist/
  docs/.astro/

rules:
  # Every document must start with "---" (enforced).
  document-start:
    present: true
    level: error
  # Off: workflow run: blocks and SHA-pinned uses lines are unavoidably long.
  line-length: disable
  # GitHub Actions uses the "on:" key, which YAML 1.1 reads as a boolean.
  truthy:
    check-keys: false
  # SHA-pinned action refs use "@sha # tag" with a single space.
  comments:
    min-spaces-from-content: 1
